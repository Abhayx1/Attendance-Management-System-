<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance Management System</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }
    </style>
</head>
<body style="display: block; padding: 2rem;">
    <div style="max-width: 1200px; margin: 0 auto; width: 100%;">
        <div class="page-header">
            <h2 style="margin: 0; color: #fff;">Attendance Dashboard</h2>
            <a href="/" class="btn btn-primary" style="text-decoration: none;">&larr; Back to Kiosk</a>
        </div>

        <!-- Dashboard Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="statPresent">0</div>
                <div class="stat-label">Present Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statAbsent">0</div>
                <div class="stat-label">Absent Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statPercentage">0%</div>
                <div class="stat-label">Attendance Rate</div>
            </div>
            <div class="stat-card" style="border-color: rgba(218, 54, 51, 0.4);">
                <div class="stat-value" id="statSpoof" style="color: #ff7b72;">0</div>
                <div class="stat-label">Spoof Attempts</div>
            </div>
        </div>

        <!-- Recent Activity Table -->
        <div class="glass-card" style="padding: 1.5rem;">
            <h3>Recent Check-ins</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: var(--text-muted);">Loading data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/js/admin.js"></script>
</body>
</html>
